<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galería - Merche y Jos&eacute; Luis</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💍</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Georgia', serif;
      background: #fdf4f1;
      color: #4a3f35;
      padding: 0;
      position: relative;
    }

    /* Subtle floral accent top-right */
    body::after {
      content: '';
      position: fixed;
      top: -50px;
      right: -50px;
      width: 180px;
      height: 180px;
      pointer-events: none;
      z-index: 0;
      border-radius: 50%;
      background:
        radial-gradient(circle at 40% 60%, rgba(207,120,120,0.18) 0%, transparent 50%),
        radial-gradient(circle at 65% 40%, rgba(220,150,140,0.14) 0%, transparent 45%),
        radial-gradient(circle at 30% 35%, rgba(235,180,170,0.16) 0%, transparent 50%);
    }

    .container { max-width: 960px; margin: 0 auto; padding: 0 1.5rem 1.5rem; position: relative; z-index: 1; }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 0 1rem;
      border-bottom: 1px solid rgba(207,140,130,0.2);
      margin-bottom: 0;
    }
    h1 {
      font-size: 1.6rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: #8b7355;
    }
    nav a {
      font-size: 0.85rem;
      color: #b5a091;
      text-decoration: none;
      margin-left: 1rem;
    }
    nav a:hover { color: #cf8888; }
    .btn-subir {
      padding: 0.5rem 1.3rem;
      background: linear-gradient(135deg, #8b7355, #a0845e);
      color: #fff;
      border-radius: 30px;
      font-size: 0.85rem;
      text-decoration: none;
      margin-left: 1rem;
      transition: background 0.15s, box-shadow 0.15s;
      letter-spacing: 0.02em;
    }
    .btn-subir:hover {
      background: linear-gradient(135deg, #73603f, #8b7355);
      box-shadow: 0 3px 10px rgba(139,115,85,0.18);
      text-decoration: none;
    }

    /* Filter bar */
    .filter-bar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(253,244,241,0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(207,140,130,0.18);
      padding: 0.7rem 0;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 0.4rem 1rem;
      border: 1px solid #dcc8be;
      background: rgba(255,255,255,0.7);
      border-radius: 30px;
      font-family: inherit;
      font-size: 0.8rem;
      color: #8b7355;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .filter-btn:hover { background: #fdf0ec; border-color: #d4a090; }
    .filter-btn.active {
      background: linear-gradient(135deg, #cf8888, #c47070);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 2px 8px rgba(207,120,120,0.2);
    }
    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 140px;
    }
    .search-wrap input {
      width: 100%;
      padding: 0.4rem 0.85rem;
      border: 1px solid #dcc8be;
      border-radius: 30px;
      font-family: inherit;
      font-size: 0.8rem;
      color: #4a3f35;
      background: rgba(255,255,255,0.7);
      outline: none;
      transition: border-color 0.2s;
    }
    .search-wrap input:focus { border-color: #cf8888; }
    .search-wrap input::placeholder { color: #c8b5a8; }
    .dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid #dcc8be;
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      max-height: 220px;
      overflow-y: auto;
      z-index: 60;
    }
    .dropdown.open { display: block; }
    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.6rem 0.85rem;
      cursor: pointer;
      font-size: 0.82rem;
      color: #4a3f35;
      transition: background 0.15s;
    }
    .dropdown-item:first-child { border-radius: 14px 14px 0 0; }
    .dropdown-item:last-child { border-radius: 0 0 14px 14px; }
    .dropdown-item:hover { background: #fdf0ec; }
    .dropdown-item .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      border: 2px solid rgba(207,140,130,0.2);
    }
    .dropdown-item .avatar-initial {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f0ddd5, #e8cfc6);
      color: #8b7355;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 600;
      flex-shrink: 0;
    }
    .active-filter-label {
      font-size: 0.8rem;
      padding: 0.4rem 0.9rem;
      border: none;
      background: linear-gradient(135deg, #cf8888, #c47070);
      color: #fff;
      border-radius: 30px;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(207,120,120,0.2);
    }
    .active-filter-label .clear {
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      opacity: 0.8;
    }
    .active-filter-label .clear:hover { opacity: 1; }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1rem;
    }
    .card {
      border-radius: 14px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(207,120,120,0.12);
    }
    .card img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
    }
    .card .meta {
      padding: 0.55rem 0.7rem;
      font-size: 0.75rem;
      color: #b5a091;
    }
    .card .meta strong {
      color: #8b7355;
      font-size: 0.78rem;
    }
    .load-more-wrap {
      text-align: center;
      padding: 2rem 0;
    }
    .load-more-btn {
      padding: 0.7rem 2rem;
      border: 1px solid #dcc8be;
      background: rgba(255,255,255,0.7);
      border-radius: 30px;
      font-family: inherit;
      font-size: 0.9rem;
      color: #8b7355;
      cursor: pointer;
      transition: all 0.2s;
    }
    .load-more-btn:hover {
      background: #fdf0ec;
      border-color: #d4a090;
    }
    .load-more-btn:disabled { opacity: 0.5; cursor: default; }
    .empty {
      text-align: center;
      color: #b5a091;
      margin-top: 3rem;
      font-size: 1rem;
      font-style: italic;
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(30,20,15,0.88);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 12px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }
    @media (max-width: 400px) {
      .logout-full { display: none !important; }
      .logout-short { display: inline !important; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Galería</h1>
      <nav id="nav">
        <a href="/upload" class="btn-subir">Subir fotos</a>
        <a href="/logout"><span class="logout-full">Cerrar sesión</span><span class="logout-short" style="display:none">Salir</span></a>
      </nav>
    </header>

    <div class="filter-bar" id="filter-bar">
      <button class="filter-btn active" id="btn-mine">Mis fotos</button>
      <div class="search-wrap">
        <input type="text" id="search-input" placeholder="Buscar persona...">
        <div class="dropdown" id="dropdown"></div>
      </div>
      <button class="filter-btn" id="btn-all">Todos</button>
    </div>

    <div id="content"></div>
  </div>

  <div class="lightbox" id="lightbox">
    <img id="lightbox-img" src="" alt="">
  </div>

  <script>
    let currentUserId = new URLSearchParams(window.location.search).get('userId');
    let myUserId = null;
    let uploaders = [];
    let currentPage = 1;
    let hasMore = false;
    let isLoading = false;

    const btnAll = document.getElementById('btn-all');
    const btnMine = document.getElementById('btn-mine');
    const searchInput = document.getElementById('search-input');
    const dropdown = document.getElementById('dropdown');
    const filterBar = document.getElementById('filter-bar');

    // Active filter label (shown when filtering by a searched user)
    let activeLabel = null;

    async function init() {
      const me = await fetch('/api/me').then(r => r.json());
      myUserId = me.id;

      if (me.is_admin) {
        const nav = document.getElementById('nav');
        const adminLink = document.createElement('a');
        adminLink.href = '/admin';
        adminLink.textContent = 'Admin';
        nav.insertBefore(adminLink, nav.firstChild);
      }
      uploaders = await fetch('/api/uploaders').then(r => r.json());

      if (!currentUserId) {
        currentUserId = String(me.id);
        updateUrl();
      }

      updateButtons();
      loadPhotos(false);
    }

    function updateUrl() {
      const url = new URL(window.location);
      if (currentUserId) {
        url.searchParams.set('userId', currentUserId);
      } else {
        url.searchParams.delete('userId');
      }
      history.replaceState(null, '', url);
    }

    function updateButtons() {
      btnAll.classList.toggle('active', !currentUserId);
      btnMine.classList.toggle('active', currentUserId == myUserId);

      // Remove old active label if any
      if (activeLabel) { activeLabel.remove(); activeLabel = null; }

      // If filtering by someone other than "all" or "mine", show a label
      if (currentUserId && currentUserId != myUserId) {
        const user = uploaders.find(u => u.id == currentUserId);
        if (user) {
          activeLabel = document.createElement('span');
          activeLabel.className = 'active-filter-label';
          activeLabel.innerHTML = `${escHtml(user.name)} <span class="clear">&times;</span>`;
          activeLabel.querySelector('.clear').addEventListener('click', () => selectFilter(null));
          filterBar.insertBefore(activeLabel, searchInput.parentElement);
        }
      }

      searchInput.value = '';
    }

    function selectFilter(userId) {
      currentUserId = userId ? String(userId) : null;
      updateUrl();
      updateButtons();
      dropdown.classList.remove('open');
      loadPhotos(false);
    }

    // --- Quick buttons ---
    btnAll.addEventListener('click', () => selectFilter(null));
    btnMine.addEventListener('click', () => selectFilter(myUserId));

    // --- Search ---
    let searchTimer = null;
    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimer);
      const q = searchInput.value.trim().toLowerCase();
      if (!q) { dropdown.classList.remove('open'); return; }
      searchTimer = setTimeout(() => filterUploaders(q), 200);
    });

    function filterUploaders(q) {

      const matches = uploaders.filter(u =>
        u.name && u.name.toLowerCase().includes(q)
      ).slice(0, 10);

      if (!matches.length) {
        dropdown.innerHTML = '<div class="dropdown-item" style="color:#b5a091">Sin resultados</div>';
      } else {
        dropdown.innerHTML = '';
        for (const u of matches) {
          const item = document.createElement('div');
          item.className = 'dropdown-item';
          const initial = (u.name || '?').charAt(0).toUpperCase();
          if (u.avatar) {
            const img = document.createElement('img');
            img.className = 'avatar';
            img.src = u.avatar;
            img.alt = '';
            img.onerror = function() {
              const span = document.createElement('span');
              span.className = 'avatar-initial';
              span.textContent = initial;
              this.replaceWith(span);
            };
            item.appendChild(img);
          } else {
            const span = document.createElement('span');
            span.className = 'avatar-initial';
            span.textContent = initial;
            item.appendChild(span);
          }
          const nameSpan = document.createElement('span');
          nameSpan.textContent = u.name;
          item.appendChild(nameSpan);
          item.addEventListener('click', () => selectFilter(u.id));
          dropdown.appendChild(item);
        }
      }
      dropdown.classList.add('open');
    }

    searchInput.addEventListener('focus', () => {
      if (searchInput.value.trim()) {
        filterUploaders(searchInput.value.trim().toLowerCase());
      }
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.search-wrap')) dropdown.classList.remove('open');
    });

    // --- Photos ---
    function loadPhotos(append = false) {
      if (isLoading) return;
      isLoading = true;

      if (!append) {
        currentPage = 1;
        document.getElementById('content').innerHTML = '';
      }

      const params = new URLSearchParams();
      if (currentUserId) params.set('userId', currentUserId);
      params.set('page', currentPage);

      fetch(`/api/uploads?${params}`)
        .then(r => r.json())
        .then(data => {
          const content = document.getElementById('content');

          if (currentPage === 1 && !data.uploads.length) {
            content.innerHTML = '<p class="empty">Aún no hay fotos. ¡Sé el primero en compartir!</p>';
            isLoading = false;
            return;
          }

          // Get or create grid
          let grid = content.querySelector('.grid');
          if (!grid) {
            grid = document.createElement('div');
            grid.className = 'grid';
            content.appendChild(grid);
          }

          for (const p of data.uploads) {
            const card = document.createElement('div');
            card.className = 'card';
            card.addEventListener('click', () => openLightbox(p.resizedUrl));
            const d = new Date(p.created_at + 'Z');
            card.innerHTML = `
              <img src="${escAttr(p.thumbnailUrl)}" alt="${escAttr(p.original_filename)}" loading="lazy">
              <div class="meta"><strong>${escHtml(p.uploader_name)}</strong><br>${escHtml(p.original_filename)} &middot; ${d.toLocaleString()}</div>
            `;
            grid.appendChild(card);
          }

          // Remove old load-more button
          const oldBtn = content.querySelector('.load-more-wrap');
          if (oldBtn) oldBtn.remove();

          hasMore = data.hasMore;
          if (hasMore) {
            const wrap = document.createElement('div');
            wrap.className = 'load-more-wrap';
            wrap.innerHTML = '<button class="load-more-btn">Cargar más fotos</button>';
            wrap.querySelector('button').addEventListener('click', () => {
              currentPage++;
              loadPhotos(true);
            });
            content.appendChild(wrap);
          }

          isLoading = false;
        })
        .catch(() => { isLoading = false; });
    }

    // --- Lightbox ---
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    function openLightbox(url) {
      lightboxImg.src = url;
      lightbox.classList.add('open');
    }
    lightbox.addEventListener('click', () => {
      lightbox.classList.remove('open');
      lightboxImg.src = '';
    });

    // --- Helpers ---
    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }
    function escAttr(s) {
      return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // --- Init ---
    init();
  </script>
</body>
</html>
