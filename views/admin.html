<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Merche y Jos&eacute; Luis</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💍</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Georgia', serif;
      background: #fdf4f1;
      color: #4a3f35;
      padding: 1.5rem;
    }
    .container { max-width: 960px; margin: 0 auto; }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(207,140,130,0.2);
    }
    h1 {
      font-size: 1.6rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: #8b7355;
    }
    nav a {
      font-size: 0.85rem;
      color: #b5a091;
      text-decoration: none;
      margin-left: 1rem;
    }
    nav a:hover { color: #cf8888; }
    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .tabs button {
      padding: 0.5rem 1.2rem;
      border: 1px solid #dcc8be;
      background: rgba(255,255,255,0.7);
      border-radius: 30px;
      font-family: inherit;
      font-size: 0.9rem;
      color: #8b7355;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tabs button:hover { background: #fdf0ec; border-color: #d4a090; }
    .tabs button.active {
      background: linear-gradient(135deg, #cf8888, #c47070);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 2px 8px rgba(207,120,120,0.2);
    }
    .panel { display: none; }
    .panel.active { display: block; }

    /* Photos grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1rem;
    }
    .card {
      border-radius: 14px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      position: relative;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 14px rgba(207,120,120,0.1);
    }
    .card.deleted { opacity: 0.45; }
    .card img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
    }
    .card .meta {
      padding: 0.5rem 0.6rem;
      font-size: 0.72rem;
      color: #b5a091;
    }
    .card .actions {
      padding: 0 0.6rem 0.5rem;
    }
    .btn {
      padding: 0.35rem 0.8rem;
      border: 1px solid #dcc8be;
      background: rgba(255,255,255,0.7);
      border-radius: 20px;
      font-family: inherit;
      font-size: 0.72rem;
      color: #8b7355;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn:hover { background: #fdf0ec; border-color: #d4a090; }
    .btn-danger { border-color: #d4787a; color: #c0392b; }
    .btn-danger:hover { background: #fdecea; border-color: #c0392b; }
    .load-more-wrap {
      text-align: center;
      padding: 1.5rem 0;
    }
    .load-more-btn {
      padding: 0.5rem 1.5rem;
      border: 1px solid #dcc8be;
      background: rgba(255,255,255,0.7);
      border-radius: 30px;
      font-family: inherit;
      font-size: 0.85rem;
      color: #8b7355;
      cursor: pointer;
      transition: all 0.2s;
    }
    .load-more-btn:hover { background: #fdf0ec; border-color: #d4a090; }

    /* Users table */
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    th, td {
      text-align: left;
      padding: 0.7rem 1rem;
      font-size: 0.85rem;
    }
    th {
      background: linear-gradient(135deg, #fdf0ec, #f9ebe6);
      color: #8b7355;
      font-weight: 600;
    }
    tr:not(:last-child) td { border-bottom: 1px solid rgba(207,140,130,0.15); }
    td img.avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      vertical-align: middle;
      margin-right: 0.4rem;
      border: 2px solid rgba(207,140,130,0.2);
    }
    @media (max-width: 400px) {
      .logout-full { display: none !important; }
      .logout-short { display: inline !important; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Admin</h1>
      <nav>
        <a href="/gallery">Galería</a>
        <a href="/upload">Subir</a>
        <a href="/logout"><span class="logout-full">Cerrar sesión</span><span class="logout-short" style="display:none">Salir</span></a>
      </nav>
    </header>

    <div class="tabs">
      <button class="active" data-tab="photos">Fotos</button>
      <button data-tab="users">Usuarios</button>
    </div>

    <div id="photos" class="panel active"></div>
    <div id="users" class="panel"></div>
  </div>

  <script>
    // Tabs
    document.querySelectorAll('.tabs button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab).classList.add('active');
      });
    });

    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }
    function escAttr(s) {
      return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // --- Photos ---
    let photoPage = 1;
    let photoHasMore = false;
    let photoLoading = false;

    function loadPhotos(append = false) {
      if (photoLoading) return;
      photoLoading = true;

      if (!append) {
        photoPage = 1;
        document.getElementById('photos').innerHTML = '';
      }

      fetch(`/api/admin/uploads?page=${photoPage}`)
        .then(r => r.json())
        .then(data => {
          const panel = document.getElementById('photos');

          if (photoPage === 1 && !data.uploads.length) {
            panel.innerHTML = '<p style="color:#b5a091;font-style:italic">No hay fotos.</p>';
            photoLoading = false;
            return;
          }

          let grid = panel.querySelector('.grid');
          if (!grid) {
            grid = document.createElement('div');
            grid.className = 'grid';
            panel.appendChild(grid);
          }

          for (const p of data.uploads) {
            const card = document.createElement('div');
            card.className = 'card' + (p.deleted ? ' deleted' : '');
            card.dataset.id = p.id;
            const d = new Date(p.created_at + 'Z');
            const thumbSrc = p.thumbnailUrl ? escAttr(p.thumbnailUrl) : '';
            card.innerHTML = `
              <img src="${thumbSrc}" alt="${escAttr(p.original_filename)}" loading="lazy">
              <div class="meta">
                ${escHtml(p.original_filename)}<br>
                ${escHtml(p.uploader_name)} &middot; ${d.toLocaleString()}
              </div>
              <div class="actions">
                ${p.deleted
                  ? `<button class="btn" onclick="restorePhoto(${p.id})">Restaurar</button>`
                  : `<button class="btn btn-danger" onclick="deletePhoto(${p.id})">Eliminar</button>`
                }
              </div>
            `;
            grid.appendChild(card);
          }

          const oldBtn = panel.querySelector('.load-more-wrap');
          if (oldBtn) oldBtn.remove();

          photoHasMore = data.hasMore;
          if (photoHasMore) {
            const wrap = document.createElement('div');
            wrap.className = 'load-more-wrap';
            wrap.innerHTML = '<button class="load-more-btn">Cargar más</button>';
            wrap.querySelector('button').addEventListener('click', () => {
              photoPage++;
              loadPhotos(true);
            });
            panel.appendChild(wrap);
          }

          photoLoading = false;
        })
        .catch(() => { photoLoading = false; });
    }

    function deletePhoto(id) {
      fetch(`/api/admin/uploads/${id}/delete`, { method: 'POST' })
        .then(() => loadPhotos(false));
    }

    function restorePhoto(id) {
      fetch(`/api/admin/uploads/${id}/restore`, { method: 'POST' })
        .then(() => loadPhotos(false));
    }

    // --- Users ---
    function loadUsers() {
      fetch('/api/admin/users')
        .then(r => r.json())
        .then(users => {
          const panel = document.getElementById('users');
          let html = `<table>
            <thead><tr><th>ID</th><th>Usuario</th><th>Email</th><th>Admin</th><th></th></tr></thead>
            <tbody>`;
          for (const u of users) {
            const avatarImg = u.avatar ? `<img class="avatar" src="${escAttr(u.avatar)}">` : '';
            html += `<tr>
              <td>${u.id}</td>
              <td>${avatarImg}${escHtml(u.name || '')}</td>
              <td>${escHtml(u.email || '')}</td>
              <td>${u.is_admin ? 'Sí' : 'No'}</td>
              <td>${u.id === 1 ? '' : `<button class="btn" onclick="toggleAdmin(${u.id})">${u.is_admin ? 'Quitar admin' : 'Hacer admin'}</button>`}</td>
            </tr>`;
          }
          html += '</tbody></table>';
          panel.innerHTML = html;
        });
    }

    function toggleAdmin(id) {
      fetch(`/api/admin/users/${id}/toggle-admin`, { method: 'POST' })
        .then(() => loadUsers());
    }

    loadPhotos();
    loadUsers();
  </script>
</body>
</html>
