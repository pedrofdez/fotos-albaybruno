<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merche y Jos&eacute; Luis</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💍</text></svg>">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Georgia', serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fdf4f1;
      color: #4a3f35;
      padding: 1.5rem;
      overflow: hidden;
    }

    /* Floral corner decorations */
    body::before,
    body::after {
      content: '';
      position: fixed;
      width: 340px;
      height: 340px;
      pointer-events: none;
      z-index: 0;
      border-radius: 50%;
      filter: blur(1px);
    }

    body::before {
      bottom: -80px;
      left: -80px;
      background:
        radial-gradient(circle at 60% 40%, rgba(207,120,120,0.35) 0%, transparent 45%),
        radial-gradient(circle at 35% 55%, rgba(220,150,140,0.3) 0%, transparent 40%),
        radial-gradient(circle at 75% 65%, rgba(190,95,100,0.2) 0%, transparent 35%),
        radial-gradient(circle at 50% 75%, rgba(215,170,155,0.25) 0%, transparent 50%),
        radial-gradient(circle at 25% 35%, rgba(235,180,170,0.3) 0%, transparent 45%),
        radial-gradient(circle at 80% 30%, rgba(180,130,110,0.15) 0%, transparent 40%);
    }

    body::after {
      top: -80px;
      right: -80px;
      background:
        radial-gradient(circle at 40% 60%, rgba(207,120,120,0.3) 0%, transparent 45%),
        radial-gradient(circle at 65% 45%, rgba(220,150,140,0.25) 0%, transparent 40%),
        radial-gradient(circle at 25% 35%, rgba(190,95,100,0.18) 0%, transparent 35%),
        radial-gradient(circle at 55% 25%, rgba(215,170,155,0.2) 0%, transparent 50%),
        radial-gradient(circle at 75% 70%, rgba(235,180,170,0.25) 0%, transparent 45%),
        radial-gradient(circle at 20% 70%, rgba(180,130,110,0.12) 0%, transparent 40%);
    }

    .card {
      text-align: center;
      max-width: 440px;
      width: 100%;
      position: relative;
      z-index: 1;
      padding: 3rem 2rem;
      border: 1px solid rgba(207,140,130,0.25);
      border-radius: 24px;
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(6px);
    }

    h1 {
      font-weight: 400;
      letter-spacing: 0.12em;
      color: #8b7355;
      line-height: 1.4;
    }

    h1 .name {
      display: block;
      font-size: 2.4rem;
    }

    h1 .sep {
      display: block;
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      color: #c4956e;
      margin: 0.2rem 0;
    }

    .ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      margin: 1.4rem auto;
    }

    .ornament .line {
      width: 50px;
      height: 1px;
      background: linear-gradient(to right, transparent, #d4a090, transparent);
    }

    .ornament .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #cf8888;
      opacity: 0.5;
    }

    p {
      font-size: 1.05rem;
      line-height: 1.6;
      margin-bottom: 2.2rem;
      color: #9e8b7a;
      font-style: italic;
    }

    .btn-google {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.8rem 1.8rem;
      border: 1px solid #ddb8a9;
      border-radius: 30px;
      background: #fff;
      color: #4a3f35;
      font-family: inherit;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
    }

    .btn-google:hover {
      background: #fdf0ec;
      box-shadow: 0 4px 16px rgba(207,120,120,0.12);
      transform: translateY(-1px);
    }

    .btn-google svg {
      width: 20px;
      height: 20px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>
      <span class="name">Merche</span>
      <span class="sep">- y -</span>
      <span class="name">Jos&eacute; Luis</span>
    </h1>
    <div class="ornament">
      <div class="line"></div>
      <div class="dot"></div>
      <div class="line"></div>
    </div>
    <p>Comparte tus fotos con nosotros</p>
    <a href="/auth/google" class="btn-google">
      <svg viewBox="0 0 24 24">
        <path fill="#4285F4"
          d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" />
        <path fill="#34A853"
          d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
        <path fill="#FBBC05"
          d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.97 10.97 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" />
        <path fill="#EA4335"
          d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
      </svg>
      Iniciar sesi&oacute;n con Google
    </a>
  </div>
</body>

</html>
